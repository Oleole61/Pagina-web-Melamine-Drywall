<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="stylus_contactanos.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
    <title>Document</title>
</head>
<body>

    <header>

        <div id="letras">
                <a href="Inicio.html" style="text-decoration: none;"><p>Inicio</p></a>
                <a href="Servicios.html" style="text-decoration: none;"><p>Servicios</p></a>
                <a href="Nosotros.html" style="text-decoration: none;"><p>Nosotros</p></a>
                <a href="Contactanos.html" style="text-decoration: none;"><p>Contactanos</p></a>
        </div>

        <img src="Logo.png">

    </header>

    <main>

        <img src="Imagenes/Contactanosdefinitva.jpg" class="img1">

        <fieldset>
            <h2>Contacto</h2>
            <p class="subtitulo">Escríbenos y un representante se pondrá en contacto con usted para obtener mayor información.</p>
        
            <form>
                <div class="filaform">
                    <div>
                        <label>Nombre y Apellido</label><br>
                        <input type="text" placeholder="Ingrese su nombre" required><br><br>
                    </div>
            
                    <div>
                        <label>Empresa</label><br>
                        <input type="text" placeholder="Ingrese su empresa" required><br><br>
                    </div>
                </div>

                <div class="filaform">
                    <div>
                        <label>Email</label><br>
                        <input type="email" placeholder="ejemplo@gmail" required><br><br>
                    </div>

                    <div>
                        <label>Telefono</label><br>
                        <input type="tel" placeholder="+51 999-999-999 " required><br><br>
                    </div>
                </div>

                <label>Sector</label><br>
                <select>
                    <option>Trabajo de melamine</option>
                    <option>Trabajo de drywall</option>
                </select><br><br>

                <label>Mensaje</label><br>
                <textarea rows="6" cols="35" placeholder="¿En que podemos ayudarlos?"></textarea><br>
                <button type="submit">Enviar mensaje</button>

            </form>

        </fieldset>

    </main>

    <footer>

        <img src="Imagenes/Íconos de redes sociales en blanco y negro.png" alt="">

        <div>
            <p>©© 2026 Nombre de la Empresa Todos los derechos reservados</p>
            <p></p>
        </div>
        
        
    </footer>
    
</body>

</html>
